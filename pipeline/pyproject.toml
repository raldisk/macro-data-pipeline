[project]
name = "ph-lakehouse-pipeline"
version = "1.0.0"
requires-python = ">=3.11"

# FROZEN AFTER WAVE 1.
# prefect and prefect-aws pinned to Prefect 3.x stable.
# Do not modify without halting all Wave 2+ agents.

dependencies = [
    "pyspark==3.5.1",
    "pyarrow==14.0.2",
    "prefect==3.2.1",
    "fastapi==0.111.0",
    "uvicorn[standard]==0.29.0",
    "asyncpg==0.29.0",
    "pydantic==2.7.1",
    "pydantic-settings==2.2.1",
    "boto3==1.34.84",
    "python-json-logger==2.0.7",
    "prefect-aws==0.5.0",
    "typer==0.12.3",
    "python-dateutil==2.9.0",
    "httpx==0.27.0",
    "beautifulsoup4==4.12.3",
    "pyyaml==6.0.1",
]

[project.optional-dependencies]
dev = [
    "pytest==8.1.1",
    "pytest-asyncio==0.23.6",
    "moto[s3]==5.0.5",
    "ruff==0.4.2",
    "black==24.4.2",
]

[build-system]
requires      = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[tool.setuptools.packages.find]
where   = ["."]
include = ["src*"]

[tool.ruff]
line-length = 100
select      = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["tests"]
