version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB:       lakehouse
      POSTGRES_USER:     lakehouse
      POSTGRES_PASSWORD: lakehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U lakehouse"]
      interval: 5s
      timeout:  5s
      retries:  10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout:  5s
      retries:  10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/ph-lakehouse &&
      exit 0
      "

  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://lakehouse:lakehouse@postgres:5432/lakehouse
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 10s
      timeout:  5s
      retries:  12

  prefect-worker:
    image: prefecthq/prefect:3-latest
    command: prefect worker start --pool default-agent-pool
    depends_on:
      prefect-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout:  5s
      retries:  6

volumes:
  postgres_data:
  minio_data:
